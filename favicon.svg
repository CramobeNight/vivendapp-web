<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#42BFEC"/>
      <stop offset="100%" stop-color="#32BB75"/>
    </linearGradient>
  </defs>

  <!-- Fondo redondeado con gradiente de marca -->
  <rect width="512" height="512" rx="90" ry="90" fill="url(#bg)"/>

  <!-- Edificio izquierdo (más bajo) — outline con perspectiva en L -->
  <path d="M55 430 L55 185 L145 185 L145 430" fill="none" stroke="white" stroke-width="22" stroke-linejoin="round" stroke-linecap="round"/>
  <line x1="105" y1="185" x2="105" y2="430" stroke="white" stroke-width="22" stroke-linecap="round"/>

  <!-- Edificio derecho (más alto) — outline con perspectiva en L -->
  <path d="M160 430 L160 125 L255 125 L255 430" fill="none" stroke="white" stroke-width="22" stroke-linejoin="round" stroke-linecap="round"/>
  <line x1="215" y1="125" x2="215" y2="430" stroke="white" stroke-width="22" stroke-linecap="round"/>

  <!-- Casa / vivienda (derecha) -->
  <path d="M275 430 L275 310 L320 265 L365 310 L365 430" fill="none" stroke="white" stroke-width="22" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Línea de conexión: edificio → nodo WiFi (superior) -->
  <line x1="215" y1="155" x2="360" y2="95" stroke="white" stroke-width="16" stroke-linecap="round"/>
  <!-- Nodo superior (punto) -->
  <circle cx="360" cy="92" r="18" fill="white"/>
  <!-- Arcos WiFi desde nodo superior -->
  <path d="M375 76 Q405 55 435 66" fill="none" stroke="white" stroke-width="16" stroke-linecap="round"/>
  <path d="M382 58 Q420 28 455 44" fill="none" stroke="white" stroke-width="16" stroke-linecap="round"/>
  <path d="M390 40 Q435 4 475 24" fill="none" stroke="white" stroke-width="16" stroke-linecap="round"/>

  <!-- Línea de conexión: nodo central → casa -->
  <line x1="310" y1="185" x2="318" y2="262" stroke="white" stroke-width="16" stroke-linecap="round"/>
  <!-- Nodo intermedio -->
  <circle cx="308" cy="185" r="16" fill="white"/>
</svg>
