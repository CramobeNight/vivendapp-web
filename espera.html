<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>VivenDapp — Empezamos en un momento</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  width:100%;height:100%;background:#0d0f22;
  font-family:'Inter',sans-serif;overflow:hidden;
  -webkit-font-smoothing:antialiased;
}

/* FONDO ANIMADO */
.bg{
  position:fixed;inset:0;
  background:radial-gradient(ellipse 80% 60% at 50% 0%, rgba(66,191,236,.12) 0%, transparent 70%),
             radial-gradient(ellipse 60% 50% at 20% 100%, rgba(50,187,117,.08) 0%, transparent 60%),
             radial-gradient(ellipse 50% 40% at 80% 80%, rgba(54,189,175,.08) 0%, transparent 60%),
             #0d0f22;
}

/* GRID */
.grid{
  position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(66,191,236,.04)1px,transparent 1px),
    linear-gradient(90deg,rgba(66,191,236,.04)1px,transparent 1px);
  background-size:60px 60px;
}

/* PARTÍCULAS */
.particles{position:fixed;inset:0;overflow:hidden;}
.particle{
  position:absolute;border-radius:50%;
  animation:float linear infinite;opacity:0;
}

/* CONTENIDO */
.center{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;padding:40px;
  z-index:10;
}

/* LOGO */
.logo-wrap{margin-bottom:48px;animation:fadeUp .8s ease both;}
.logo{
  font-family:'Nunito',sans-serif;font-weight:900;
  font-size:clamp(42px,8vw,80px);letter-spacing:-1px;
  line-height:1;
}
.logo .v{color:#42BFEC}
.logo .d{color:#32BB75}
.logo-sub{
  font-size:clamp(11px,2vw,15px);font-weight:600;
  letter-spacing:4px;text-transform:uppercase;
  color:rgba(242,244,244,0.4);margin-top:10px;
}

/* DIVIDER ANIMADO */
.line-wrap{
  width:clamp(120px,20vw,200px);height:2px;
  background:rgba(255,255,255,.08);border-radius:2px;
  margin:0 auto 48px;overflow:hidden;
  animation:fadeUp .8s .1s ease both;
}
.line-fill{
  height:100%;width:0%;
  background:linear-gradient(90deg,#42BFEC,#36BDAF,#32BB75);
  border-radius:2px;
  animation:loadLine 4s 1s ease-in-out infinite alternate;
}

/* TEXTO PRINCIPAL */
.headline{
  font-family:'Nunito',sans-serif;font-weight:900;
  font-size:clamp(28px,6vw,72px);
  color:#F2F4F4;line-height:1.1;
  margin-bottom:20px;
  animation:fadeUp .8s .2s ease both;
}
.headline .grad{
  background:linear-gradient(135deg,#42BFEC,#36BDAF,#32BB75);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}

.subtitle{
  font-size:clamp(14px,2.5vw,20px);
  color:rgba(242,244,244,0.5);
  font-weight:500;line-height:1.6;
  max-width:500px;
  animation:fadeUp .8s .3s ease both;
}

/* DOTS PULSANTES */
.dots{
  display:flex;gap:10px;margin-top:48px;
  animation:fadeUp .8s .4s ease both;
}
.dot{
  width:8px;height:8px;border-radius:50%;
  background:linear-gradient(135deg,#42BFEC,#32BB75);
  animation:pulse 1.4s ease-in-out infinite;
}
.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}

/* ESQUINAS DECORATIVAS */
.corner{position:fixed;width:80px;height:80px;opacity:.25;}
.corner.tl{top:24px;left:24px;border-top:2px solid #42BFEC;border-left:2px solid #42BFEC;}
.corner.tr{top:24px;right:24px;border-top:2px solid #36BDAF;border-right:2px solid #36BDAF;}
.corner.bl{bottom:24px;left:24px;border-bottom:2px solid #36BDAF;border-left:2px solid #36BDAF;}
.corner.br{bottom:24px;right:24px;border-bottom:2px solid #32BB75;border-right:2px solid #32BB75;}

/* URL ABAJO */
.url-tag{
  position:fixed;bottom:32px;left:50%;transform:translateX(-50%);
  font-size:clamp(11px,1.5vw,14px);font-weight:600;
  letter-spacing:2px;color:rgba(242,244,244,0.2);
  animation:fadeUp .8s .6s ease both;
  white-space:nowrap;
}

/* KEYFRAMES */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(24px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes loadLine{
  0%{width:20%}100%{width:95%}
}
@keyframes pulse{
  0%,100%{transform:scale(.8);opacity:.4}
  50%{transform:scale(1.2);opacity:1}
}
@keyframes float{
  0%{transform:translateY(100vh) scale(0);opacity:0}
  10%{opacity:.6}
  90%{opacity:.3}
  100%{transform:translateY(-20px) scale(1);opacity:0}
}
</style>
</head>
<body>

<div class="bg"></div>
<div class="grid"></div>

<!-- Partículas generadas por JS -->
<div class="particles" id="particles"></div>

<!-- Esquinas decorativas -->
<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<!-- CONTENIDO CENTRAL -->
<div class="center">

  <div class="logo-wrap">
    <div class="logo"><span class="v">Viven</span><span class="d">Dapp</span></div>
    <div class="logo-sub">Protocolo Inmobiliario · LATAM</div>
  </div>

  <div class="line-wrap"><div class="line-fill"></div></div>

  <h1 class="headline">Empezamos en<br><span class="grad">un momento</span></h1>
  <p class="subtitle">Gracias por tu tiempo — en breve comenzamos</p>

  <div class="dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

</div>

<div class="url-tag">vivendapp.io</div>

<script>
// Partículas flotantes
const container = document.getElementById('particles');
const colors = ['#42BFEC','#36BDAF','#32BB75'];

function createParticle() {
  const p = document.createElement('div');
  p.className = 'particle';
  const size = Math.random() * 4 + 2;
  const x = Math.random() * 100;
  const dur = Math.random() * 12 + 8;
  const delay = Math.random() * 6;
  p.style.cssText = `
    width:${size}px;height:${size}px;
    left:${x}%;bottom:-10px;
    background:${colors[Math.floor(Math.random()*3)]};
    animation-duration:${dur}s;
    animation-delay:${delay}s;
    filter:blur(${Math.random()>.5?'1px':'0px'});
  `;
  container.appendChild(p);
  setTimeout(() => p.remove(), (dur + delay) * 1000);
}

// Generar partículas continuamente
for (let i = 0; i < 18; i++) createParticle();
setInterval(createParticle, 600);
</script>
</body>
</html>
